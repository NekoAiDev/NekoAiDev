  <style>
    :root {
      --bg: #0e0e16;
      --bg-2: #16161f;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --pink: #ff9ec7;
      --gold: #ffd866;
      --text: #ececf1;
      --muted: #9a9aae;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 70% -10%, #241b2e 0%, var(--bg) 55%) fixed;
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      padding: 48px 20px 64px;
    }
    .wrap { max-width: 920px; margin: 0 auto; }
    header {
      text-align: center;
      padding: 24px 0 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
    }
    header img {
      width: 168px;
      height: auto;
      filter: drop-shadow(0 8px 24px rgba(255, 158, 199, 0.25));
    }
    header h1 {
      font-size: 34px;
      letter-spacing: 1px;
      margin-top: 14px;
      background: linear-gradient(90deg, var(--pink), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    header p.tag { color: var(--muted); margin-top: 6px; font-size: 14px; }
    section { margin: 32px 0; }
    h2 {
      font-size: 18px;
      color: var(--gold);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2::before { content: "🐾"; }
    .intro {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      color: var(--muted);
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .proj {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      transition: transform .15s ease, border-color .15s ease;
    }
    .proj h3::after { content: " \2197"; color: var(--pink); font-size: 13px; }
    .proj:hover { transform: translateY(-3px); border-color: var(--pink); }
    .proj h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
    .proj p { font-size: 13px; color: var(--muted); }
    .proj .tag-row { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      font-size: 11px;
      color: var(--pink);
      border: 1px solid rgba(255, 158, 199, 0.3);
      border-radius: 999px;
      padding: 2px 9px;
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--pink); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="https://img.nekoaidev.top/cnneko.png" alt="NekoAiDev" />
      <h1>NekoAiDev</h1>
      <p class="tag">喵~ 一个以猫娘文化为底色的开源组织</p>
    </header>

    <section>
      <h2>关于我们</h2>
      <div class="intro">
        NekoAiDev 由一群喜欢猫娘与开源的开发者组成，致力于打造好用、可爱、接地气的开发者工具与 AI 应用。
        我们维护从命令行工具、AI 聊天客户端到基础设施平台的多个项目，希望让技术也能软乎乎、暖洋洋的喵~
      </div>
    </section>

    <section>
      <h2>仓库项目</h2>
      <div id="repo-list" class="grid">
        <p class="intro">正在从 GitHub 加载仓库喵~</p>
      </div>
    </section>

    <script>
      (function () {
        var api = 'https://api.github.com/orgs/NekoAiDev/repos?per_page=100&sort=updated';
        function escapeHtml(s) {
          return String(s).replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
          });
        }
        fetch(api)
          .then(function (r) { return r.json(); })
          .then(function (repos) {
            var box = document.getElementById('repo-list');
            if (!Array.isArray(repos) || !repos.length) {
              box.innerHTML = '<p class="intro">暂时没有公开仓库喵~</p>';
              return;
            }
            repos = repos.slice().sort(function (a, b) {
              return (b.stargazers_count || 0) - (a.stargazers_count || 0);
            }).filter(function (r) {
              return r.name.indexOf('.') !== 0;
            });
            box.innerHTML = repos.map(function (r) {
              var lang = r.language ? '<span class="pill">' + escapeHtml(r.language) + '</span>' : '';
              var desc = r.description ? escapeHtml(r.description) : '暂无描述喵~';
              return '<a class="proj" href="' + escapeHtml(r.html_url) + '" target="_blank" rel="noopener">' +
                       '<h3>' + escapeHtml(r.name) + '</h3>' +
                       '<p>' + desc + '</p>' +
                       '<div class="tag-row">' + lang +
                         '<span class="pill">★ ' + (r.stargazers_count || 0) + '</span>' +
                       '</div>' +
                     '</a>';
            }).join('');
          })
          .catch(function () {
            document.getElementById('repo-list').innerHTML = '<p class="intro">仓库列表加载失败，请稍后刷新喵~</p>';
          });
      })();
    </script>

    <footer>
      © NekoAiDev · 用爱与代码制作的猫娘开源组织 · <a href="https://github.com/NekoAiDev">GitHub</a>
    </footer>
  </div>
</body>
</html>
