name: 💡 功能建议
description: 为代码审核机器人提出新功能或改进建议
title: "[建议] "
labels: [enhancement]
body:
  - type: textarea
    id: feature
    attributes:
      label: 功能描述
      description: 清晰地描述你想要的新功能
      placeholder: 希望审核机器人能支持 XXX 功能...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 为什么需要这个功能？
      description: 这个功能能解决什么问题？
      placeholder: |
        目前审核机器人在处理 XXX 时不够完善，如果能加上 YYY 会更好...

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 你认为这个功能的优先级如何？
      options:
        - 高 - 很需要，没有很不方便
        - 中 - 有更好，没有也行
        - 低 - 锦上添花
    validations:
      required: true
